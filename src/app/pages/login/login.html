
<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">

      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <div   *ngIf="showotp">
        <label class="block text-sm font-medium mb-1">otp</label>
        <input
          type="otp"
          name="otp"
          [(ngModel)]="otp"
          required
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Login
      </button>

    </form>

  </div>
</div>

  <!-- Popup Modal -->
  <div
  class="fixed inset-0 bg-gray-900/20 bg-opacity-40 flex items-center justify-center z-50"
  *ngIf="showPopup"
  >
  <div class="bg-white rounded-lg shadow-lg p-6 w-80 text-center">
      <h2 class="text-lg font-bold mb-3">Error</h2>
      <p class="text-sm text-gray-700 mb-5">{{ popupMessage }}</p>

      <button
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
        (click)="closePopup()"
      >
        OK
      </button>
  </div>
  </div>

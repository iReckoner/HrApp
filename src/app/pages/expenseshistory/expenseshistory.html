<div class="min-h-screen bg-gray-50 p-4 font-sans text-slate-800">

  <header class="flex items-center justify-between mb-8 px-2">
    <div class="flex items-center gap-4">
      <button class="text-xl">
        <i class="fa-solid fa-chevron-left"></i> </button>
      <h1 class="text-2xl font-bold">Expenses Report</h1>
    </div>
  </header>

  <!-- <div class="flex items-center justify-between mb-6 px-2">
    <h2 class="text-xl font-extrabold">{{ currentMonth }}</h2>
    <button class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-medium shadow-sm hover:bg-indigo-100 transition">
      Select Month
    </button>
  </div> -->
  <div class="flex items-center justify-between mb-6 px-2">
    <h2 class="text-xl font-extrabold">{{ currentMonth }}</h2>

    <input
      type="month"
      #monthPicker
      class="hidden"
      (change)="onMonthSelect($event)">

    <button
      (click)="monthPicker.showPicker()"
      class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full font-medium shadow-sm hover:bg-indigo-100 transition">
      Select Month
    </button>
  </div>

  <div class="space-y-4">
    @for (item of expenseData; track item.date) {
    <div
         class="flex items-center justify-between bg-white p-5 rounded-2xl shadow-[0_4px_10px_rgba(0,0,0,0.05)] border border-gray-100">

      <div class="flex items-center gap-4">
        <div class="text-slate-700 bg-slate-50 p-3 rounded-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19,4H18V2H16V4H8V2H6V4H5C3.89,4 3,4.9 3,6V20C3,21.1 3.89,22 5,22H19C20.1,22 21,21.1 21,20V6C21,4.9 20.1,4 19,4M19,20H5V10H19V20M19,8H5V6H19V8M7,12H9V14H7V12M11,12H13V14H11V12M15,12H17V14H15V12M7,16H9V18H7V16M11,16H13V18H11V16M15,16H17V18H15V16Z" />
          </svg>
        </div>
        <span class="text-lg font-semibold tracking-wide">{{ item.date }}</span>
      </div>

      <div class="border-2 border-slate-800 rounded-2xl px-4 py-1.5 min-w-[80px] text-center">
        <span class="font-medium text-lg">{{ item.duration }} mins</span>
      </div>

    </div>}
    @empty {
      <p>No records found for this month.</p>
    }
  </div>
</div>

<div class="min-h-screen bg-slate-50 p-4 font-sans text-slate-800">

  <div class="flex items-center justify-between mb-6">
    <button class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="Stack-chevron-left-path-here" /></svg></button>
    <h1 class="text-xl font-bold text-slate-700">Profile</h1>
    <button class="p-2 text-slate-700"(click)='logout()'>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
    </button>
  </div>

  <div class="flex flex-col items-center mb-8">
    <div class="w-28 h-28 bg-blue-100 rounded-full mb-4 flex items-center justify-center">
      <div class="w-full h-full bg-indigo-100 rounded-full border-4 border-white shadow-sm"></div>
    </div>
    <h2 class="text-2xl font-bold text-slate-800">{{ user.name }}</h2>
    <p class="text-slate-400 font-medium">{{ user.role }}</p>
    <p class="text-slate-400 text-sm mt-1">Employee ID: {{ user.employeeId }}</p>
  </div>

  <div class="space-y-4 max-w-md mx-auto">
    @for (field of profileFields; track field) {
    <div
         class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">

      <div class="p-2 bg-indigo-50 rounded-lg text-indigo-600">
        <div class="w-6 h-6 flex items-center justify-center">ℹ️</div>
      </div>

      <div>
        <p class="text-sm font-bold text-slate-800">{{ field.label }}</p>
        <p class="text-slate-500">{{ user[field.key] || '--'  }}</p>
      </div>
    </div>
  }
  </div>

</div>
